# 错误消息配置文件
# 有些版本的 IDEA 会自动设置properties的编码为IOS-8859-1 请设置成UTF8

# ==================== 通用错误码 ====================
SUCCESS=操作成功
FAILED=操作失败

# ==================== Internal 内部错误码 (0~99) ====================
Internal.INVALID_PARAMETER=参数异常：{0}
Internal.INTERNAL_ERROR=系统内部错误：{0}
Internal.GET_ENUM_FAILED=获取枚举类型失败，枚举类：{0}
Internal.GET_CACHE_FAILED=获取缓存失败：{0}
Internal.DB_INTERNAL_ERROR=数据库异常
Internal.LOGIN_CAPTCHA_GENERATE_FAIL=验证码生成失败
Internal.EXCEL_PROCESS_ERROR=excel处理失败：{0}

# ==================== Client 客户端错误码 (100~999) ====================
Client.COMMON_FORBIDDEN_TO_CALL=禁止调用
Client.COMMON_REQUEST_TOO_OFTEN=调用太过频繁，请稍后再试
Client.COMMON_REQUEST_PARAMETERS_INVALID=请求参数异常，{0}
Client.COMMON_REQUEST_METHOD_INVALID=请求方式：{0} 不支持
Client.COMMON_REQUEST_RESUBMIT=请求重复提交
Client.COMMON_NO_AUTHORIZATION=请求接口：{0} 失败，用户未授权
Client.INVALID_TOKEN=token异常
Client.TOKEN_PROCESS_FAILED=token处理失败：{0}

# ==================== External 外部错误码 (1000~9999) ====================
External.FAIL_TO_PAY_ON_ALIPAY=支付宝调用失败

