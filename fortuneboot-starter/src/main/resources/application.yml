# 开发环境配置
server:
  # 服务器的HTTP端口，默认为8080
  port: 8080
  servlet:
    # 应用的访问路径
    context-path: /
  tomcat:
    # tomcat的URI编码
    uri-encoding: UTF-8
    # 连接数满后的排队数，默认为100
    accept-count: 1000
    threads:
      # tomcat最大线程数，默认为200
      max: 800
      # Tomcat启动初始化的线程数，默认值10
      min-spare: 100


# Spring配置 如果需要无Mysql直接启动的话  dev改为test
# 生产环境把dev改为prod
spring:
  profiles:
    active: basic,prod
  flyway:
    enabled: false
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration

# 数据库类型配置：sqlite（默认）或 mysql
db:
  type: ${DB_TYPE:sqlite}
  sqlite:
    path: ${DB_PATH:./data/fortuneboot.db}

# 如果需要无Mysql直接启动的话  可以将这个参数置为true, 并且spring.profile.active: dev换成test
fortuneboot:
  embedded:
    mysql: false



springdoc:
  api-docs:
    enabled: true
    groups:
      enabled: true
  group-configs:
    - group: '公共API'
      packages-to-scan: com.fortuneboot.admin.controller.common
    - group: '内置系统API'
      packages-to-scan: com.fortuneboot.admin.controller.system


