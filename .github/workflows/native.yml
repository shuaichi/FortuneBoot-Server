name: Build Native Images & Docker

on:
  push:
    branches:
      - "master_native"
    tags:
      - "v*"

jobs:
  build-native:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux/amd64
            output_dir: linux_amd64
          - os: ubuntu-24.04-arm
            platform: linux/arm64
            output_dir: linux_arm64

    steps:
      - uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build native image
        run: |
          mkdir -p ./out/${{ matrix.output_dir }}
          docker buildx build \
            --platform ${{ matrix.platform }} \
            -f Dockerfile \
            --output type=local,dest=./out/${{ matrix.output_dir }} \
            .

      - name: Clean up and extract binary
        run: |
          TARGET_DIR="out/${{ matrix.output_dir }}"
          BINARY_PATH="$TARGET_DIR/app/fortuneboot-starter"
          
          if [ -f "$BINARY_PATH" ]; then
            echo "Found binary at $BINARY_PATH"
            cp "$BINARY_PATH" ./fortuneboot-starter-tmp
            sudo rm -rf "$TARGET_DIR"/*
            mv ./fortuneboot-starter-tmp "$TARGET_DIR/fortuneboot-starter-${{ matrix.output_dir }}"
          else
            echo "Error: Binary not found at $BINARY_PATH"
            ls -R "$TARGET_DIR"
            exit 1
          fi

          sudo chown -R $USER "$TARGET_DIR"
          sudo chmod -R 755 "$TARGET_DIR"
          
          echo "Listing final build output:"
          ls -R "$TARGET_DIR"

      # 先进入 out 目录再压缩，避免解压时多出一个无关的 out/ 文件夹层级
      - name: Compress output directory into zip
        run: |
          cd ./out
          zip -r "${{ matrix.output_dir }}.zip" "${{ matrix.output_dir }}"

      # 去掉 name 里的 .zip 后缀，防止 GitHub Artifacts 生成双重 .zip.zip 文件
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-binary-${{ matrix.output_dir }}
          path: out/${{ matrix.output_dir }}.zip
          if-no-files-found: error

  release:
    needs: build-native
    runs-on: ubuntu-latest
    # 赋予 Release 写入权限
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Read version from yaml
        id: get_version
        run: |
          VERSION=$(grep "version:" fortuneboot-infrastructure/src/main/resources/application-basic.yml | awk '{print $2}')
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Detected version: $VERSION"

      # 下载的 path 应该指定存放的“目录”（./out），而不是指定完整“文件路径”
      - uses: actions/download-artifact@v4
        with:
          name: native-binary-linux_amd64
          path: ./out

      - uses: actions/download-artifact@v4
        with:
          name: native-binary-linux_arm64
          path: ./out

      - name: Inspect directories
        run: |
          echo "Current directory structure:"
          ls -R ./out

      # 上传具体的 .zip 文件到 Release 资产中
      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/master_native'
        with:
          tag_name: v${{ env.VERSION }}
          name: Release v${{ env.VERSION }}
          files: |
            ./out/linux_amd64.zip
            ./out/linux_arm64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    needs: build-native
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Read version from yaml
        id: get_version
        run: |
          VERSION=$(grep "version:" fortuneboot-infrastructure/src/main/resources/application-basic.yml | awk '{print $2}')
          # 提取次版本号，例如 1.4.5 -> 1.4
          MINOR_VERSION=$(echo "$VERSION" | cut -d. -f1,2)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "MINOR_VERSION=$MINOR_VERSION" >> $GITHUB_ENV
          echo "Detected version: $VERSION, minor: $MINOR_VERSION"

      # 下载两个架构的 native binary
      - uses: actions/download-artifact@v4
        with:
          name: native-binary-linux_amd64
          path: ./artifacts

      - uses: actions/download-artifact@v4
        with:
          name: native-binary-linux_arm64
          path: ./artifacts

      # 解压 artifact zip 到 out/ 目录，供 Dockerfile.runtime 使用
      - name: Prepare binaries
        run: |
          mkdir -p out/linux_amd64 out/linux_arm64
          unzip ./artifacts/linux_amd64.zip -d ./out/
          unzip ./artifacts/linux_arm64.zip -d ./out/
          echo "Binary files:"
          ls -R ./out/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 登录 DockerHub
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 登录阿里云容器镜像服务
      - name: Login to Aliyun Registry
        uses: docker/login-action@v3
        with:
          registry: registry.cn-hangzhou.aliyuncs.com
          username: ${{ secrets.ALIYUN_REGISTRY_USERNAME }}
          password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

      # 构建并推送多架构 Docker 镜像
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.runtime
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/fortuneboot:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/fortuneboot:${{ env.MINOR_VERSION }}
            registry.cn-hangzhou.aliyuncs.com/${{ secrets.ALIYUN_REGISTRY_NAMESPACE }}/fortuneboot:latest
            registry.cn-hangzhou.aliyuncs.com/${{ secrets.ALIYUN_REGISTRY_NAMESPACE }}/fortuneboot:${{ env.MINOR_VERSION }}